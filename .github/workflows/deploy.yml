name: Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode SSH key
        run: |
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > /tmp/gha_id
          chmod 600 /tmp/gha_id

      - name: Deploy and rebuild on server
        run: |
          ssh -i /tmp/gha_id -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
              set -e
              cd /opt/pokerChips/pokerChips
              git pull origin main
              docker stop poker-chips || true
              docker rm poker-chips || true
              docker build -t poker-chips .
              docker run -d --name poker-chips \
                -p 3000:3000 \
                --env-file .env \
                --restart unless-stopped \
                poker-chips
              docker image prune -f
              echo "✅ poker-chips deployed"
            '
